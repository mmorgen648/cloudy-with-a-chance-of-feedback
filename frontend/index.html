<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudy With A Chance Of Feedback</title>

    <!-- ============================================================
         GOOGLE FONT
         ============================================================ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ============================================================
         GLOBAL STYLESHEET
         ============================================================ -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ============================================================
         HEADER
         ============================================================ -->
    <header class="header">
      <div class="header-inner">
        <!-- Logo -->
        <img src="assets/logo-clean.png" alt="Cloudy Logo" class="logo" />

        <!-- Titel -->
        <div class="header-title">Cloudy With A Chance Of Feedback</div>

        <!-- Auth Button (Login oder Admin) -->
        <a href="login.html" class="nav-button" id="authButton">Admin Login</a>
      </div>
    </header>

    <!-- ============================================================
         MAIN CONTENT
         ============================================================ -->
    <main class="main">
      <section class="card">
        <h2>Feedback abgeben</h2>

        <form class="form">
          <label for="feedback">Dein Feedback</label>
          <textarea id="feedback" rows="5"></textarea>

          <button type="submit" class="primary-button">
            Feedback absenden
          </button>
        </form>
      </section>
    </main>

    <!-- ============================================================
         AUTH SCRIPT
         ============================================================ -->
    <script>
      // ============================================================
      // Auth-Handling für die Startseite
      //
      // Verhalten:
      //
      // NICHT eingeloggt:
      // [Admin Login]
      //
      // Eingeloggt:
      // [Admin] [Logout]
      //
      // Token wird im Browser in sessionStorage gespeichert.
      // ============================================================

      document.addEventListener("DOMContentLoaded", () => {
        const authButton = document.getElementById("authButton");
        const token = sessionStorage.getItem("id_token");

        // Sicherheit: Falls Button im HTML fehlt → Script abbrechen
        if (!authButton) return;

        // ============================================================
        // NICHT EINGELOGGT
        // ============================================================

        if (!token) {
          authButton.textContent = "Admin Login";
          authButton.href = "login.html";
          return;
        }

        // ============================================================
        // EINGELOGGT
        // ============================================================

        // Admin Button anzeigen
        authButton.textContent = "Admin";
        authButton.href = "admin.html";

        // Logout Button dynamisch erstellen
        const logoutButton = document.createElement("a");
        logoutButton.textContent = "Logout";
        logoutButton.href = "#";
        logoutButton.className = "nav-button";

        logoutButton.addEventListener("click", (event) => {
          event.preventDefault();

          // ------------------------------------------------------------
          // 1. Browser Session löschen
          // ------------------------------------------------------------
          sessionStorage.clear();

          // ------------------------------------------------------------
          // 2. Cognito Logout vorbereiten
          // ------------------------------------------------------------
          const domain =
            "eu-central-1eg8otyz7b.auth.eu-central-1.amazoncognito.com";
          const clientId = "5gc47l6rh621jdl9ai7bfli2qv";

          // Dynamischer Redirect (funktioniert lokal und CloudFront)
          const logoutRedirect = window.location.origin + "/index.html";

          const logoutUrl =
            `https://${domain}/logout` +
            `?client_id=${encodeURIComponent(clientId)}` +
            `&logout_uri=${encodeURIComponent(logoutRedirect)}`;

          // ------------------------------------------------------------
          // 3. Cognito Logout ausführen
          // ------------------------------------------------------------
          window.location.href = logoutUrl;
        });

        // Logout Button neben Admin Button einfügen
        authButton.parentNode.appendChild(logoutButton);
      });
    </script>
  </body>
</html>
