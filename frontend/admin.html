<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Cloudy With A Chance Of Feedback</title>

    <!-- ============================================================
         GOOGLE FONT
         ============================================================ -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ============================================================
         GLOBAL STYLESHEET
         ============================================================ -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- ============================================================
         ADMIN ACCESS PROTECTION
         Wenn kein Token vorhanden → Redirect zu Login
         ============================================================ -->
    <script>
      const token = sessionStorage.getItem("id_token");

      if (!token) {
        window.location.href = "login.html";
      }
    </script>

    <!-- ============================================================
         HEADER
         ============================================================ -->
    <header class="header">
      <div class="header-inner">
        <!-- Logo -->
        <img src="assets/logo-clean.png" alt="Cloudy Logo" class="logo" />

        <!-- Titel -->
        <div class="header-title">Cloudy With A Chance Of Feedback</div>

        <!-- Navigation -->
        <div>
          <a href="index.html" class="nav-button">Startseite</a>
          <a href="#" class="nav-button" id="logoutButton">Logout</a>
        </div>
      </div>
    </header>

    <!-- ============================================================
         MAIN CONTENT
         ============================================================ -->
    <main class="main">
      <section class="card">
        <h2>Statistik (letzte 7 Tage)</h2>

        <!-- ============================================================
             FEEDBACK STATISTIK
             Werte werden dynamisch vom Backend geladen
             ============================================================ -->
        <div class="stats-grid">
          <div class="stat-box">
            <span>Positive</span>
            <strong id="positiveCount">--</strong>
          </div>

          <div class="stat-box">
            <span>Negative</span>
            <strong id="negativeCount">--</strong>
          </div>

          <div class="stat-box">
            <span>Neutral</span>
            <strong id="neutralCount">--</strong>
          </div>

          <div class="stat-box">
            <span>Mixed</span>
            <strong id="mixedCount">--</strong>
          </div>
        </div>

        <button class="primary-button" id="refreshButton">Aktualisieren</button>
      </section>

      <!-- ============================================================
           FEEDBACK LIST
           Alle Feedbacks werden dynamisch vom Backend geladen
           GET /api/feedback
           ============================================================ -->
      <section class="card">
        <h2>Alle Feedbacks</h2>

        <div id="feedbackList" class="feedback-list">
          <!-- Wird per JavaScript befüllt -->
        </div>
      </section>
    </main>

    <!-- ============================================================
         ADMIN SCRIPT
         ============================================================ -->
    <script>
      /* ============================================================
         LOGOUT
         ============================================================ */

      document.getElementById("logoutButton").addEventListener("click", (e) => {
        e.preventDefault();

        sessionStorage.clear();

        const domain =
          "eu-central-1eg8otyz7b.auth.eu-central-1.amazoncognito.com";

        const clientId = "5gc47l6rh621jdl9ai7bfli2qv";

        const logoutRedirect = window.location.origin + "/index.html";

        const logoutUrl =
          `https://${domain}/logout` +
          `?client_id=${encodeURIComponent(clientId)}` +
          `&logout_uri=${encodeURIComponent(logoutRedirect)}`;

        window.location.href = logoutUrl;
      });

      /* ============================================================
         LOAD STATS FROM BACKEND
         GET /api/feedback/stats
         ============================================================ */

      async function loadStats() {
        try {
          const token = sessionStorage.getItem("id_token");

          const response = await fetch("/api/feedback/stats", {
            headers: {
              Authorization: "Bearer " + token,
            },
          });

          const data = await response.json();

          document.getElementById("positiveCount").textContent =
            data.positive ?? 0;

          document.getElementById("negativeCount").textContent =
            data.negative ?? 0;

          document.getElementById("neutralCount").textContent =
            data.neutral ?? 0;

          document.getElementById("mixedCount").textContent = data.mixed ?? 0;
        } catch (error) {
          console.error("Stats Fehler:", error);
        }
      }

      /* ============================================================
         LOAD FEEDBACK LIST FROM BACKEND
         GET /api/feedback
         ============================================================ */

      async function loadFeedbackList() {
        try {
          const token = sessionStorage.getItem("id_token");

          const response = await fetch("/api/feedback", {
            headers: {
              Authorization: "Bearer " + token,
            },
          });

          const feedbacks = await response.json();

          const container = document.getElementById("feedbackList");

          container.innerHTML = "";

          if (feedbacks.length === 0) {
            container.innerHTML =
              "<p style='color:#64748b'>Noch keine Feedbacks vorhanden.</p>";
            return;
          }

          feedbacks.forEach((fb) => {
            /* --------------------------------------------------------
               SENTIMENT – CSS-Modifier und Anzeigetext
               -------------------------------------------------------- */
            const sentimentClass = (fb.sentiment ?? "neutral").toLowerCase();

            const sentimentLabel =
              {
                positive: "Positiv",
                negative: "Negativ",
                neutral: "Neutral",
                mixed: "Mixed",
              }[sentimentClass] ?? fb.sentiment;

            /* --------------------------------------------------------
               DATUM formatieren
               -------------------------------------------------------- */
            const date = fb.createdAt
              ? new Date(fb.createdAt).toLocaleString("de-DE", {
                  day: "2-digit",
                  month: "2-digit",
                  year: "numeric",
                  hour: "2-digit",
                  minute: "2-digit",
                })
              : "–";

            /* --------------------------------------------------------
               KEY PHRASES – JSON-String zu Tags
               -------------------------------------------------------- */
            let keyTags = "";

            try {
              const phrases = JSON.parse(fb.keyPhrasesJson ?? "[]");

              keyTags = phrases
                .map((p) => `<span class="key-tag">${p}</span>`)
                .join("");
            } catch (_) {
              keyTags = "";
            }

            /* --------------------------------------------------------
               CONFIDENCE BAR – dominanter Sentiment-Score
               -------------------------------------------------------- */
            let confidencePercent = 0;

            try {
              const scores = JSON.parse(fb.confidenceJson ?? "{}");

              const raw = scores[sentimentClass] ?? 0;

              confidencePercent = Math.round(raw * 100);
            } catch (_) {
              confidencePercent = 0;
            }

            /* --------------------------------------------------------
               KARTE rendern
               -------------------------------------------------------- */
            const card = document.createElement("div");

            card.className = "feedback-card";

            card.innerHTML = `
              <div class="feedback-card-header">
                <span class="sentiment-badge ${sentimentClass}">${sentimentLabel}</span>
                <span class="feedback-date">${date}</span>
              </div>

              <p class="feedback-text">${fb.message ?? "–"}</p>

              <div class="key-phrases">${keyTags}</div>

              <div class="confidence-bar-wrapper">
                <div class="confidence-bar-label">Konfidenz: ${confidencePercent}%</div>
                <div class="confidence-bar-track">
                  <div class="confidence-bar-fill" style="width: ${confidencePercent}%"></div>
                </div>
              </div>
            `;

            container.appendChild(card);
          });
        } catch (error) {
          console.error("Feedback-Liste Fehler:", error);
        }
      }

      /* ============================================================
         BUTTON HANDLER
         ============================================================ */

      document
        .getElementById("refreshButton")
        .addEventListener("click", loadStats);

      /* ============================================================
         AUTO LOAD
         ============================================================ */

      loadStats();
      loadFeedbackList();
    </script>
  </body>
</html>
