<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – Cloudy With A Chance Of Feedback</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <script>
      // Admin-Schutz: Ohne Login-Token keine Admin-Seite
      const token = sessionStorage.getItem("id_token");
      if (!token) {
        window.location.href = "login.html";
      }
    </script>

    <header class="header">
      <div class="header-inner">
        <img src="assets/logo-clean.png" alt="Cloudy Logo" class="logo" />

        <div class="header-title">Cloudy With A Chance Of Feedback</div>

        <a href="index.html" class="nav-button">Startseite</a>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <h2>Statistik (letzte 7 Tage)</h2>

        <div class="stats-grid">
          <div class="stat-box">
            <span>Positive</span>
            <strong>--</strong>
          </div>

          <div class="stat-box">
            <span>Negative</span>
            <strong>--</strong>
          </div>

          <div class="stat-box">
            <span>Neutral</span>
            <strong>--</strong>
          </div>

          <div class="stat-box">
            <span>Mixed</span>
            <strong>--</strong>
          </div>
        </div>

        <button class="primary-button">Aktualisieren</button>
      </section>
    </main>
  </body>
</html>
