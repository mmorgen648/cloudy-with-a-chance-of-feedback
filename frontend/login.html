<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Cloudy</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header">
      <div class="header-inner">
        <img src="assets/logo-clean.png" alt="Cloudy Logo" class="logo" />

        <div class="header-title">Cloudy With A Chance Of Feedback</div>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <h2>Admin Login</h2>

        <p>
          Für den Zugriff auf das Admin-Dashboard musst du dich über Cognito
          anmelden.
        </p>

        <button id="loginButton" class="primary-button">
          Login mit Cognito
        </button>
      </section>
    </main>

    <script src="login.js"></script>
  </body>
</html>
