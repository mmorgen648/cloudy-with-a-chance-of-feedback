# ---------------------------------------
# PostgreSQL – RDS (prod profile)
# ---------------------------------------
spring.datasource.url=jdbc:postgresql://cloudy-postgres.cd0kqosyqopb.eu-central-1.rds.amazonaws.com:5432/cloudydb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Actuator / Kubernetes Health Probes
management.endpoint.health.probes.enabled=true
management.endpoint.health.probes.add-additional-paths=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# ---------------------------------------
# Security – Cognito JWT Validation
# ---------------------------------------
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_EG8oTyz7B
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_EG8oTyz7B/.well-known/jwks.json