# =========================================================
# GitHub Actions CI/CD Pipeline
# Deploy Backend + Frontend auf AWS EKS
#
# Diese Pipeline:
# 1. führt Backend Tests aus
# 2. baut Docker Images mit Commit SHA
# 3. pusht Images nach ECR
# 4. deployt auf EKS
# 5. setzt Images per kubectl set image
# 6. erstellt automatisch das DB Secret
# =========================================================

name: Deploy to EKS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "k8s/**"
      - ".github/workflows/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  CLUSTER_NAME: cloudy-eks

  ECR_BACKEND: 038217523163.dkr.ecr.eu-central-1.amazonaws.com/cloudy-feedback-backend
  ECR_FRONTEND: 038217523163.dkr.ecr.eu-central-1.amazonaws.com/cloudy-feedback-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------
      # Repository auschecken
      # -----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------
      # AWS Login über OIDC Role
      # -----------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::038217523163:role/GitHubActionsEKSDeployRole
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------
      # Backend Tests
      # -----------------------------------------------------
      - name: Run backend tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      # -----------------------------------------------------
      # Login in Amazon ECR
      # -----------------------------------------------------
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin 038217523163.dkr.ecr.eu-central-1.amazonaws.com

      # -----------------------------------------------------
      # Backend Image bauen
      # -----------------------------------------------------
      - name: Build backend image
        run: |
          docker build \
          --platform linux/amd64 \
          -t $ECR_BACKEND:${{ github.sha }} \
          ./backend

      # -----------------------------------------------------
      # Backend Image pushen
      # -----------------------------------------------------
      - name: Push backend image
        run: |
          docker push $ECR_BACKEND:${{ github.sha }}

      # -----------------------------------------------------
      # Frontend Image bauen
      # -----------------------------------------------------
      - name: Build frontend image
        run: |
          docker build \
          --platform linux/amd64 \
          -t $ECR_FRONTEND:${{ github.sha }} \
          ./frontend

      # -----------------------------------------------------
      # Frontend Image pushen
      # -----------------------------------------------------
      - name: Push frontend image
        run: |
          docker push $ECR_FRONTEND:${{ github.sha }}

      # -----------------------------------------------------
      # kubeconfig für Zugriff auf EKS
      # -----------------------------------------------------
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --name $CLUSTER_NAME \
          --region $AWS_REGION

      # -----------------------------------------------------
      # Datenbank Secret automatisch erstellen
      # -----------------------------------------------------
      - name: Create database secret
        run: |
          kubectl create secret generic db-secret \
          --from-literal=DB_USERNAME=${{ secrets.DB_USERNAME }} \
          --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
          --dry-run=client -o yaml | kubectl apply -f -

      # -----------------------------------------------------
      # Kubernetes Ressourcen deployen
      # -----------------------------------------------------
      - name: Deploy base manifests
        run: |
          # ACM Zertifikat ARN dynamisch aus AWS holen
          ACM_CERT_ARN=$(aws acm list-certificates \
            --region eu-central-1 \
            --query 'CertificateSummaryList[?DomainName==`cloudy.cloudhelden-projekte.com`].CertificateArn' \
            --output text)
          # Ingress mit aktueller ARN deployen
          sed "s|arn:aws:acm:eu-central-1:[0-9]*:certificate/[a-z0-9-]*|$ACM_CERT_ARN|g" \
            k8s/ingress.yaml | kubectl apply -f -
          # Restliche Manifeste deployen
          kubectl apply -f k8s/ --selector='!kubernetes.io/ingress.class'

      # -----------------------------------------------------
      # Images im Deployment setzen
      # -----------------------------------------------------
      - name: Update backend image
        run: |
          kubectl set image deployment/backend \
          backend=$ECR_BACKEND:${{ github.sha }}

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend \
          frontend=$ECR_FRONTEND:${{ github.sha }}

      # -----------------------------------------------------
      # Rollout Status prüfen
      # -----------------------------------------------------
      - name: Check rollout
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s

      # -----------------------------------------------------
      # CloudFront Cache leeren
      # -----------------------------------------------------
      - name: Invalidate CloudFront cache
        run: |
          CLOUDFRONT_DISTRIBUTION=$(aws cloudfront list-distributions \
            --query 'DistributionList.Items[?contains(Origins.Items[0].DomainName, `elb.amazonaws.com`)].Id' \
            --output text)
          aws cloudfront create-invalidation \
            --distribution-id $CLOUDFRONT_DISTRIBUTION \
            --paths "/*"
