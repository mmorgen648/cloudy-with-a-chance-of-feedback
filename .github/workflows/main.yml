name: Deploy to EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  CLUSTER_NAME: cloudy-eks
  ECR_BACKEND: 038217523163.dkr.ecr.eu-central-1.amazonaws.com/cloudy-feedback-backend
  ECR_FRONTEND: 038217523163.dkr.ecr.eu-central-1.amazonaws.com/cloudy-feedback-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::038217523163:role/GitHubActionsEKSDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Run backend tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin 038217523163.dkr.ecr.eu-central-1.amazonaws.com

      - name: Build backend image
        run: |
          docker build \
          --platform linux/amd64 \
          -t $ECR_BACKEND:${{ github.sha }} \
          ./backend

      - name: Push backend image
        run: |
          docker push $ECR_BACKEND:${{ github.sha }}

      - name: Build frontend image
        run: |
          docker build \
          --platform linux/amd64 \
          -t $ECR_FRONTEND:${{ github.sha }} \
          ./frontend

      - name: Push frontend image
        run: |
          docker push $ECR_FRONTEND:${{ github.sha }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --name $CLUSTER_NAME \
          --region $AWS_REGION

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Check rollout
        run: |
          kubectl rollout status deployment/backend --timeout=120s
          kubectl rollout status deployment/frontend --timeout=120s
