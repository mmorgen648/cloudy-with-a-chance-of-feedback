# ============================================================
# Kubernetes Deployment für das Frontend
#
# Dieses Deployment startet einen nginx Container,
# der die statischen Frontend Dateien ausliefert.
#
# Das Image wird über die CI/CD Pipeline aktualisiert.
# Die Pipeline setzt automatisch das neue Image mit Git SHA.
# ============================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  labels:
    app: frontend

spec:
  # Laut Projektarchitektur nur eine Replica
  # (Dozentenvorgabe / Kostenkontrolle)
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        # Container Definition für das Frontend
        - name: frontend

          # Default Image aus AWS ECR
          # Dieses Image dient nur als Initialwert.
          # Das echte Image wird später per
          # "kubectl set image" in der Pipeline gesetzt.
          image: 038217523163.dkr.ecr.eu-central-1.amazonaws.com/cloudy-feedback-frontend:5809c5d

          # Wichtig:
          # Kubernetes soll immer das aktuelle Image aus ECR ziehen,
          # damit kein altes gecachtes Image weiterverwendet wird.
          imagePullPolicy: Always

          # nginx läuft im Container auf Port 80
          ports:
            - containerPort: 80

          # Ressourcenlimits passend für t3.small Nodes
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"
