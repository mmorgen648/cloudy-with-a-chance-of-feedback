# Kubernetes Deployment für das Spring Boot Backend
# Startet genau einen Backend-Pod gemäß Dozentenvorgabe.
# Mehrere Replikas sind bewusst deaktiviert (t3.small / 1 Node / 1 Replica).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend

spec:
  # Genau eine Replica laut Architekturentscheidung
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        # Container Definition
        - name: backend

          # Backend-Image aus AWS ECR
          # Der Tag wird automatisch in der CI/CD Pipeline ersetzt
          image: 038217523163.dkr.ecr.eu-central-1.amazonaws.com/cloudy-feedback-backend:5809c5d

          # Wichtig:
          # Kubernetes soll immer das Image neu aus ECR ziehen
          # Dadurch wird verhindert, dass alte Images gecacht werden
          imagePullPolicy: Always

          # Environment Variablen für die Datenbank und das Spring-Profil
          env:
            # Username aus Kubernetes Secret
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_USERNAME

            # Passwort aus Kubernetes Secret
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD

            # Aktiviert das Spring Boot Profil "prod"
            - name: SPRING_PROFILES_ACTIVE
              value: prod

          # Spring Boot läuft im Container auf Port 8080
          ports:
            - containerPort: 8080

          # Ressourcenlimits passend für t3.small
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Readiness Probe:
          # Kubernetes wartet hier länger, weil Spring Boot + DB + Security
          # einige Sekunden zum vollständigen Start brauchen
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10

          # Liveness Probe:
          # Erst später prüfen, damit der Container nicht zu früh neu gestartet wird
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 20
 
 
